<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' ws://127.0.0.1:9247; script-src 'self' 'unsafe-inline'; connect-src ws://127.0.0.1:9247">
  <title>Adjutant</title>
  <link rel="stylesheet" href="styles/global.css">
  <link rel="stylesheet" href="styles/hud.css">
</head>
<body>
  <div id="adjutant-container">
    <div id="hud-frame">
      <div id="hud-corner-tl"></div>
      <div id="hud-corner-tr"></div>
      <div id="hud-corner-bl"></div>
      <div id="hud-corner-br"></div>
    </div>

    <canvas id="face-canvas"></canvas>

    <div id="voice-indicator">
      <div id="voice-dot"></div>
      <span id="voice-label">STANDBY</span>
    </div>

    <div id="transcript-overlay">
      <div id="transcript-text"></div>
    </div>

    <div id="input-bar">
      <input type="text" id="text-input" placeholder="Orders, Commander..." autocomplete="off" spellcheck="false">
      <button id="stop-btn" title="Stop speaking">■</button>
      <button id="dashboard-btn" title="Open Dashboard">◆</button>
    </div>

    <div id="status-bar">
      <div id="ticker"></div>
    </div>
  </div>

  <script src="app.bundle.js"></script>
</body>
</html>
